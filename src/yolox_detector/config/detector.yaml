yolox_detector:
  ros__parameters:
    backend: "cpu"  # "cpu" (XNNPACK) or "npu" (QNN HTP)
    model_path: ""  # Empty selects the default model for the chosen backend.
    qnn_lib_dir: ""
    input_width: 416
    input_height: 416
    score_threshold: 0.45
    nms_threshold: 0.45
    num_classes: 80
    image_topic: "/camera/rgb/image_raw"
    detections_topic: "/detections"
    debug_image_topic: "/detections/image"

    # ── Single-target tracking ──────────────────────────────────────────────
    # COCO class name to lock onto and follow. Change live with:
    #   ros2 param set /yolox_detector target_class bottle
    target_class: "person"
    tracked_topic: "/tracked_object"
    track_smoothing: 0.7       # EMA weight on new bbox measurement (0..1); higher = less lag
    track_gate: 0.15           # max center jump to keep lock (fraction of width)
    track_reset_frames: 10     # frames target unseen before the lock is dropped

dataset_image_publisher:
  ros__parameters:
    dataset_path: "datasets/sample_images"
    image_topic: "/camera/rgb/image_raw"
    publish_rate: 15.0
    loop: true
    frame_id: "dataset_camera"
