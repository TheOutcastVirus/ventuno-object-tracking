/**:
  ros__parameters:
    # Which streams to enable
    enable_rgb: true
    enable_left: false
    enable_right: false

    # RGB settings
    # 640x360 keeps the native 16:9 aspect ratio (1920x1080 / 3) so the CROP
    # resize mode doesn't cut FOV. At 1080p, NV12 over the OAK's USB2 link
    # (~93 MB/s needed vs ~35-40 MB/s available) was the frame-rate bottleneck;
    # 640x360 NV12 needs only ~10 MB/s and the detector resizes to 416x416
    # regardless, so no detection quality is lost.
    rgb_fps: 30.0
    rgb_width: 640
    rgb_height: 360
    # "video" | "preview" | "isp"
    rgb_output: "video"

    # Mono settings (left / right)
    mono_fps: 30.0
    mono_width: 640
    mono_height: 400

    # Topic names
    rgb_topic: "oak/rgb/image_raw"
    left_topic: "oak/left/image_raw"
    right_topic: "oak/right/image_raw"

    # Camera info URLs (empty = no calibration published)
    rgb_camera_info_url: ""
    left_camera_info_url: ""
    right_camera_info_url: ""

    # Frame IDs
    rgb_frame_id: "oak_rgb_camera_optical_frame"
    left_frame_id: "oak_left_camera_optical_frame"
    right_frame_id: "oak_right_camera_optical_frame"
